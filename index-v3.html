<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRYPTO/FEAR — Live Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="v3-style.css">
</head>
<body>
    <!-- Scan Lines Effect -->
    <div class="scan-lines"></div>
    
    <!-- Grid Background -->
    <div class="grid-bg"></div>
    
    <div class="terminal-container">
        <!-- Top Bar -->
        <header class="top-bar">
            <div class="system-title">
                <span class="bracket">[</span>
                <span class="title-text">CRYPTO/FEAR</span>
                <span class="bracket">]</span>
            </div>
            <div class="system-status">
                <span class="status-dot pulse-green"></span>
                <span class="status-text">LIVE</span>
                <span class="status-time" id="liveTime">00:00:00</span>
            </div>
        </header>

        <!-- Main Grid -->
        <main class="main-grid">
            <!-- Large Fear Card -->
            <section class="fear-card">
                <div class="card-label">SENTIMENT_INDEX</div>
                <div class="fear-value-container">
                    <div class="fear-number" id="fearNumber">11</div>
                    <div class="fear-label" id="fearLabel">EXTREME FEAR</div>
                </div>
                <div class="fear-gauge">
                    <div class="gauge-track">
                        <div class="gauge-fill" id="gaugeFill" style="width: 11%"></div>
                        <div class="gauge-marker" id="gaugeMarker" style="left: 11%">
                            <div class="marker-line"></div>
                        </div>
                    </div>
                    <div class="gauge-labels">
                        <span>0</span>
                        <span>FEAR</span>
                        <span>50</span>
                        <span>GREED</span>
                        <span>100</span>
                    </div>
                </div>
                <div class="signal-box">
                    <div class="signal-icon">▲</div>
                    <div class="signal-text">STRONG BUY SIGNAL</div>
                </div>
            </section>

            <!-- Data Stack -->
            <aside class="data-stack">
                <!-- BTC Price -->
                <div class="data-block">
                    <div class="block-label">BTC/USD</div>
                    <div class="block-value" id="btcPrice">$71,236</div>
                    <div class="block-change positive" id="btcChange">+4.30%</div>
                </div>

                <!-- Dominance -->
                <div class="data-block">
                    <div class="block-label">BTC_DOM</div>
                    <div class="block-value" id="btcDom">56.6%</div>
                </div>

                <!-- ATH -->
                <div class="data-block">
                    <div class="block-label">FROM_ATH</div>
                    <div class="block-value negative" id="athDist">-34.2%</div>
                </div>

                <!-- Status -->
                <div class="data-block highlight">
                    <div class="block-label">MARKET_STATUS</div>
                    <div class="block-value small">ACCUMULATION</div>
                </div>
            </aside>

            <!-- Chart Section -->
            <section class="chart-section">
                <div class="chart-header">
                    <span class="chart-title">HISTORICAL/Q1_2026</span>
                    <span class="chart-range">83 DAYS</span>
                </div>
                <div class="chart-canvas-wrapper">
                    <canvas id="historicalChart"></canvas>
                </div>
            </section>

            <!-- Table Section -->
            <section class="table-section">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>DATE</th>
                            <th>F&G</th>
                            <th>BTC</th>
                            <th>CHG</th>
                            <th>SIG</th>
                        </tr>
                    </thead>
                    <tbody id="tableData">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </section>
        </main>

        <!-- Bottom Bar -->
        <footer class="bottom-bar">
            <div class="footer-left">
                <span>LAST_UPDATE: <span id="lastUpdate">2026-03-24</span></span>
            </div>
            <div class="footer-right">
                <button class="action-btn" id="refreshBtn">
                    <span>⟳</span> REFRESH
                </button>
                <button class="action-btn" id="exportBtn">
                    <span>↓</span> EXPORT
                </button>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="v3-app.js"></script>
</body>
</html>
